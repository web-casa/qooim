{{define "dict-form"}}
<div class="modal" x-data="{ open: true }" x-show="open" @keydown.escape.window="open=false">
  <article>
    <header style="display:flex;justify-content:space-between;align-items:center">
      <h3>{{if .DictForm.ID}}编辑字典{{else}}新建字典{{end}}</h3>
      <button class="secondary"
              style="padding:.2rem .6rem"
              @click="open=false; $el.closest('.modal').remove()">×</button>
    </header>
    {{if .Error}}<p style="color:var(--pico-color-red-500)">{{.Error}}</p>{{end}}
    <form {{if .DictForm.ID}}
            hx-put="/console/system/dicts/{{.DictForm.ID}}"
          {{else}}
            hx-post="/console/system/dicts"
          {{end}}
          hx-target="#modal-host"
          hx-swap="innerHTML">
      <input type="hidden" name="csrf" value="{{.CSRFToken}}">
      <label>名称 *
        <input name="name" required value="{{.DictForm.Name}}" maxlength="64">
      </label>
      <label>编码 *
        <input name="code" required value="{{.DictForm.Code}}" maxlength="64">
        <small class="muted">字典项关联此 code</small>
      </label>
      <label>类型
        <select name="dictType">
          <option value="0" {{if eq .DictForm.DictType 0}}selected{{end}}>未分类</option>
          <option value="1" {{if eq .DictForm.DictType 1}}selected{{end}}>系统</option>
          <option value="2" {{if eq .DictForm.DictType 2}}selected{{end}}>业务</option>
        </select>
      </label>
      <label>备注
        <textarea name="remark" rows="2" maxlength="200">{{.DictForm.Remark}}</textarea>
      </label>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button type="button" class="secondary"
                @click="open=false; $el.closest('.modal').remove()">取消</button>
        <button type="submit">保存</button>
      </div>
    </form>
  </article>
</div>
{{end}}
