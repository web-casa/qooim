app:
  name: exam-run
  env: dev
  version: 0.0.0

http:
  addr: ":8080"
  read_timeout: 15s
  write_timeout: 60s
  shutdown_timeout: 10s
  api_prefix: /api

db:
  # Leave empty in skeleton mode to run without a database.
  # Example: user:pass@tcp(localhost:3306)/examrun?parseTime=true&multiStatements=true&charset=utf8mb4
  dsn: ""
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

jwt:
  # Override via EXAMRUN_JWT_SECRET in real deployments.
  secret: change-me-in-production
  issuer: exam-run
  expires_in: 24h

logger:
  level: info
  format: json
