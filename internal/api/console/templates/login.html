{{define "content"}}
<article class="login-card">
  <h2 style="margin-top:0">登录 Qoo.IM Console</h2>
  {{if .Error}}<p style="color:var(--pico-color-red-500)">{{.Error}}</p>{{end}}
  <form method="POST" action="/console/login">
    <label>账号
      <input type="text" name="username" required autofocus value="{{.Username}}">
    </label>
    <label>密码
      <input type="password" name="password" required>
    </label>
    <button type="submit">登录</button>
  </form>
  <p class="muted" style="text-align:center;margin-top:1rem">
    Console Spike · Gate 1
  </p>
</article>
{{end}}
