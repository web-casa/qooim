{{define "content"}}
<h2 style="margin:0 0 1rem">用户管理</h2>
<div class="toolbar">
  <input type="search"
         name="q"
         placeholder="按姓名搜索…"
         value="{{.Q}}"
         hx-get="/console/system/users/table"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#user-table"
         hx-push-url="true">
  <button hx-get="/console/system/users/new"
          hx-target="#modal-host"
          hx-swap="innerHTML">+ 新建用户</button>
  <span class="spinner" aria-busy="true"></span>
</div>
<div id="user-table">
  {{template "users-table" .}}
</div>
<div id="modal-host"></div>
{{end}}
