{{define "dept-form"}}
<div class="modal" x-data="{ open: true }" x-show="open" @keydown.escape.window="open=false">
  <article>
    <header style="display:flex;justify-content:space-between;align-items:center">
      <h3>{{if .DeptForm.ID}}编辑部门{{else}}新建部门{{end}}</h3>
      <button class="secondary"
              style="padding:.2rem .6rem"
              @click="open=false; $el.closest('.modal').remove()">×</button>
    </header>
    {{if .Error}}<p style="color:var(--pico-color-red-500)">{{.Error}}</p>{{end}}
    <form {{if .DeptForm.ID}}
            hx-put="/console/system/depts/{{.DeptForm.ID}}"
          {{else}}
            hx-post="/console/system/depts"
          {{end}}
          hx-target="#modal-host"
          hx-swap="innerHTML">
      <input type="hidden" name="csrf" value="{{.CSRFToken}}">
      <label>名称 *
        <input name="name" required value="{{.DeptForm.Name}}" maxlength="64">
      </label>
      <label>简称 *
        <input name="shortName" required value="{{.DeptForm.ShortName}}" maxlength="32">
      </label>
      <label>编码
        <input name="code" value="{{.DeptForm.Code}}" maxlength="32">
      </label>
      <label>上级部门
        <select name="parentId">
          <option value="">— 顶级 —</option>
          {{range .Depts}}
            {{if ne .ID $.DeptForm.ID}}
            <option value="{{.ID}}" {{if eq .ID $.DeptForm.ParentID}}selected{{end}}>{{.Name}}</option>
            {{end}}
          {{end}}
        </select>
      </label>
      <label>排序
        <input type="number" name="sortCode" value="{{.DeptForm.SortCode}}">
      </label>
      <label>状态
        <select name="status">
          <option value="1" {{if eq .DeptForm.Status "1"}}selected{{end}}>启用</option>
          <option value="0" {{if eq .DeptForm.Status "0"}}selected{{end}}>停用</option>
        </select>
      </label>
      <label>备注
        <textarea name="remark" rows="2" maxlength="200">{{.DeptForm.Remark}}</textarea>
      </label>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button type="button" class="secondary"
                @click="open=false; $el.closest('.modal').remove()">取消</button>
        <button type="submit">保存</button>
      </div>
    </form>
  </article>
</div>
{{end}}
