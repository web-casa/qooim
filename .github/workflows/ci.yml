name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go build ./...
      - run: go test -race -timeout 120s ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      # v7 of the action pulls golangci-lint v2 binaries (built with a
      # newer Go toolchain). The v6 + `latest` combo silently picked
      # v1.64.8, which can't load configs targeting Go 1.25+.
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6

  e2e-pg:
    name: e2e (postgres 18)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: qooim
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      QOOIM_TEST_DSN: postgresql://postgres:postgres@127.0.0.1:5432/qooim?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go test -tags pg -race -timeout 5m ./tests/...
