app:
  name: Qoo.IM
  env: dev
  version: 0.0.0

http:
  addr: ":8080"
  read_timeout: 15s
  write_timeout: 60s
  shutdown_timeout: 10s
  api_prefix: /api

db:
  # Leave empty in skeleton mode to run without a database.
  # Example: postgresql://user:pass@host:5432/qooim?sslmode=disable
  # Real DSNs MUST come from the QOOIM_DB_DSN env var, not this file.
  dsn: ""
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m

jwt:
  # Override via QOOIM_JWT_SECRET in real deployments.
  secret: change-me-in-production
  issuer: qooim
  expires_in: 24h

logger:
  level: info
  format: json

storage:
  # "local" (only one shipped today). S3/OSS lands later.
  backend: local
  # Where the local backend writes uploaded files. Resolved relative to
  # the working directory; an absolute path is recommended in prod.
  local_root: ./storage
  # Hard cap on a single multipart upload. 0 = no cap (not recommended).
  max_upload_bytes: 67108864 # 64 MiB

ai:
  # Gates /api/ai/*. Off by default until you set a token.
  enabled: false
  # Provider id. "siliconflow" is OpenAI-compatible at base_url.
  provider: siliconflow
  base_url: https://api.siliconflow.cn
  # Override via QOOIM_AI_TOKEN in real deployments.
  token: ""
  model: deepseek-chat
  http_timeout: 30s
