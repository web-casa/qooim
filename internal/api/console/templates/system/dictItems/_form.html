{{define "dictItem-form"}}
<div class="modal" x-data="{ open: true }" x-show="open" @keydown.escape.window="open=false">
  <article>
    <header style="display:flex;justify-content:space-between;align-items:center">
      <h3>{{if .DictItemForm.ID}}编辑字典项{{else}}新建字典项{{end}}</h3>
      <button class="secondary"
              style="padding:.2rem .6rem"
              @click="open=false; $el.closest('.modal').remove()">×</button>
    </header>
    {{if .Error}}<p style="color:var(--pico-color-red-500)">{{.Error}}</p>{{end}}
    <form {{if .DictItemForm.ID}}
            hx-put="/console/system/dicts/{{.CurrentDict.ID}}/items/{{.DictItemForm.ID}}"
          {{else}}
            hx-post="/console/system/dicts/{{.CurrentDict.ID}}/items"
          {{end}}
          hx-target="#modal-host"
          hx-swap="innerHTML">
      <input type="hidden" name="csrf" value="{{.CSRFToken}}">
      <input type="hidden" name="dictCode" value="{{.DictItemForm.DictCode}}">
      <label>名称
        <input name="itemName" value="{{.DictItemForm.ItemName}}" maxlength="64">
      </label>
      <label>值 *
        <input name="itemValue" required value="{{.DictItemForm.ItemValue}}" maxlength="64">
      </label>
      <label>父项值
        <input name="parentItemValue" value="{{.DictItemForm.ParentItemValue}}" maxlength="64">
        <small class="muted">可选；用于级联字典</small>
      </label>
      <label>排序
        <input type="number" name="itemOrder" value="{{.DictItemForm.ItemOrder}}">
      </label>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button type="button" class="secondary"
                @click="open=false; $el.closest('.modal').remove()">取消</button>
        <button type="submit">保存</button>
      </div>
    </form>
  </article>
</div>
{{end}}
