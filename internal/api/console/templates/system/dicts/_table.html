{{define "dicts-table"}}
<table>
  <thead>
    <tr>
      <th>名称</th>
      <th>编码</th>
      <th>类型</th>
      <th>备注</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {{range .DictRows}}
    <tr id="dict-row-{{.ID}}">
      <td><a href="/console/system/dicts/{{.ID}}/items">{{.Name}}</a></td>
      <td><code>{{.Code}}</code></td>
      <td>{{if eq .DictType 1}}系统{{else if eq .DictType 2}}业务{{else}}-{{end}}</td>
      <td class="muted">{{.Remark}}</td>
      <td class="row-actions">
        <button hx-get="/console/system/dicts/{{.ID}}/items"
                hx-boost="true"
                onclick="window.location='/console/system/dicts/{{.ID}}/items'">字典项</button>
        <button hx-get="/console/system/dicts/{{.ID}}/edit"
                hx-target="#modal-host"
                hx-swap="innerHTML">编辑</button>
        <button class="secondary"
                hx-delete="/console/system/dicts/{{.ID}}"
                hx-confirm="将同时删除字典「{{.Name}}」及其所有字典项，确认？"
                hx-target="#dict-row-{{.ID}}"
                hx-swap="outerHTML swap:0.3s">删除</button>
      </td>
    </tr>
    {{else}}
    <tr><td colspan="5" class="muted" style="text-align:center;padding:2rem">无数据</td></tr>
    {{end}}
  </tbody>
</table>
<div class="pagination">
  <span class="muted">共 {{.Total}} 条 · 第 {{.Page}}/{{.TotalPages}} 页</span>
  {{if gt .Page 1}}
    <button class="secondary"
            hx-get="/console/system/dicts/table?q={{.Q}}&page={{add .Page -1}}"
            hx-target="#dict-table"
            hx-push-url="true">上一页</button>
  {{end}}
  {{if lt .Page .TotalPages}}
    <button class="secondary"
            hx-get="/console/system/dicts/table?q={{.Q}}&page={{add .Page 1}}"
            hx-target="#dict-table"
            hx-push-url="true">下一页</button>
  {{end}}
</div>
{{end}}
