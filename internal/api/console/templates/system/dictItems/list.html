{{define "content"}}
<h2 style="margin:0 0 1rem">
  <a href="/console/system/dicts" class="muted" style="font-size:.7em;font-weight:normal">← 字典列表</a>
  字典项 / {{.CurrentDict.Name}} <code class="muted">{{.CurrentDict.Code}}</code>
</h2>
<div class="toolbar">
  <input type="search"
         name="q"
         placeholder="按名称搜索…"
         value="{{.Q}}"
         hx-get="/console/system/dicts/{{.CurrentDict.ID}}/items/table"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#dictItem-table"
         hx-push-url="true">
  <button hx-get="/console/system/dicts/{{.CurrentDict.ID}}/items/new"
          hx-target="#modal-host"
          hx-swap="innerHTML">+ 新建字典项</button>
  <span class="spinner" aria-busy="true"></span>
</div>
<div id="dictItem-table">
  {{template "dictItems-table" .}}
</div>
<div id="modal-host"></div>
{{end}}
