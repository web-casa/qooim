{{define "content"}}
<h2 style="margin:0 0 1rem">字典管理</h2>
<div class="toolbar">
  <input type="search"
         name="q"
         placeholder="按名称搜索…"
         value="{{.Q}}"
         hx-get="/console/system/dicts/table"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#dict-table"
         hx-push-url="true">
  <button hx-get="/console/system/dicts/new"
          hx-target="#modal-host"
          hx-swap="innerHTML">+ 新建字典</button>
  <span class="spinner" aria-busy="true"></span>
</div>
<div id="dict-table">
  {{template "dicts-table" .}}
</div>
<div id="modal-host"></div>
{{end}}
