{{define "content"}}
<h2 style="margin:0 0 1rem">部门管理</h2>
<div class="toolbar">
  <input type="search"
         name="q"
         placeholder="按名称/编码搜索…"
         value="{{.Q}}"
         hx-get="/console/system/depts/table"
         hx-trigger="keyup changed delay:300ms, search"
         hx-target="#dept-table"
         hx-push-url="true">
  <button hx-get="/console/system/depts/new"
          hx-target="#modal-host"
          hx-swap="innerHTML">+ 新建部门</button>
  <span class="spinner" aria-busy="true"></span>
</div>
<div id="dept-table">
  {{template "depts-table" .}}
</div>
<div id="modal-host"></div>
{{end}}
