{{define "positions-table"}}
<table>
  <thead>
    <tr>
      <th>名称</th>
      <th>编码</th>
      <th>类型</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {{range .PositionRows}}
    <tr id="position-row-{{.ID}}">
      <td>{{.Name}}</td>
      <td><code>{{.Code}}</code></td>
      <td>{{if eq .IsVirtual 1}}虚拟{{else}}实体{{end}}</td>
      <td class="row-actions">
        <button hx-get="/console/system/positions/{{.ID}}/edit"
                hx-target="#modal-host"
                hx-swap="innerHTML">编辑</button>
        <button class="secondary"
                hx-delete="/console/system/positions/{{.ID}}"
                hx-confirm="确认删除岗位「{{.Name}}」？"
                hx-target="#position-row-{{.ID}}"
                hx-swap="outerHTML swap:0.3s">删除</button>
      </td>
    </tr>
    {{else}}
    <tr><td colspan="4" class="muted" style="text-align:center;padding:2rem">无数据</td></tr>
    {{end}}
  </tbody>
</table>
<div class="pagination">
  <span class="muted">共 {{.Total}} 条 · 第 {{.Page}}/{{.TotalPages}} 页</span>
  {{if gt .Page 1}}
    <button class="secondary"
            hx-get="/console/system/positions/table?q={{.Q}}&page={{add .Page -1}}"
            hx-target="#position-table"
            hx-push-url="true">上一页</button>
  {{end}}
  {{if lt .Page .TotalPages}}
    <button class="secondary"
            hx-get="/console/system/positions/table?q={{.Q}}&page={{add .Page 1}}"
            hx-target="#position-table"
            hx-push-url="true">下一页</button>
  {{end}}
</div>
{{end}}
