{{define "role-form"}}
<div class="modal" x-data="{ open: true }" x-show="open" @keydown.escape.window="open=false">
  <article>
    <header style="display:flex;justify-content:space-between;align-items:center">
      <h3>{{if .RoleForm.ID}}编辑角色{{else}}新建角色{{end}}</h3>
      <button class="secondary"
              style="padding:.2rem .6rem"
              @click="open=false; $el.closest('.modal').remove()">×</button>
    </header>
    {{if .Error}}<p style="color:var(--pico-color-red-500)">{{.Error}}</p>{{end}}
    <form {{if .RoleForm.ID}}
            hx-put="/console/system/roles/{{.RoleForm.ID}}"
          {{else}}
            hx-post="/console/system/roles"
          {{end}}
          hx-target="#modal-host"
          hx-swap="innerHTML">
      <input type="hidden" name="csrf" value="{{.CSRFToken}}">
      <label>名称 *
        <input name="name" required value="{{.RoleForm.Name}}" maxlength="64">
      </label>
      <label>编码 *
        <input name="code" required value="{{.RoleForm.Code}}" maxlength="32" pattern="[a-zA-Z0-9_-]+">
        <small class="muted">用于程序判定，例 admin / viewer</small>
      </label>
      <label>权限串
        <input name="authority" value="{{.RoleForm.Authority}}" maxlength="2048">
        <small class="muted">英文逗号分隔，例 home,answer:list</small>
      </label>
      <label>备注
        <textarea name="remark" rows="2" maxlength="200">{{.RoleForm.Remark}}</textarea>
      </label>
      <label>状态
        <select name="status">
          <option value="1" {{if eq .RoleForm.Status 1}}selected{{end}}>启用</option>
          <option value="0" {{if eq .RoleForm.Status 0}}selected{{end}}>停用</option>
        </select>
      </label>
      <div style="display:flex;gap:.5rem;justify-content:flex-end">
        <button type="button" class="secondary"
                @click="open=false; $el.closest('.modal').remove()">取消</button>
        <button type="submit">保存</button>
      </div>
    </form>
  </article>
</div>
{{end}}
